           /sensing/camera/camera4/camera_info, /sensing/camera/camera4/image_raw,
           /sensing/camera/camera5/camera_info, /sensing/camera/camera5/image_raw,
           /sensing/camera/camera6/camera_info, /sensing/camera/camera6/image_raw,
           /sensing/camera/camera7/camera_info, /sensing/camera/camera7/image_raw,
